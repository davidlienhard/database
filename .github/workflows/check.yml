name: check

on: push

jobs:
  check:

    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: ['ubuntu-latest']
        php: ['8.4', '8.5']

    name: PHP ${{ matrix.php }} - ${{ matrix.os }}

    services:
      mysql:
        image: mysql:9.5
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Set up MySQL client
      run: sudo apt-get update && sudo apt-get install -y mysql-client

    - name: Wait for MySQL to be ready
      run: |
        for i in {1..30}; do
          mysqladmin ping -h 127.0.0.1 -u root -proot && break
          sleep 2
        done

    - name: Import database schema/data
      run: |
        mysql \
        -h localhost \
        -u root \
        -proot \
        testdb < ./db/schema.sql
    
    - name: Verify MySQL connection from host
      run: |
        sudo apt-get install -y mysql-client
        mysql --host localhost --port 32574 -utestuser -ptestpass -e "SHOW DATABASES"
        
    - uses: actions/checkout@v6
    - run: git fetch origin master

    - name: Setup PHP ${{ matrix.php }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php }}
        extensions: mysqli

    - name: Get composer cache directory
      id: composer-cache
      run: echo "::set-output name=dir::$(composer config cache-files-dir)"

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-${{ matrix.php }}-composer-

    - name: "Cache PHPStan Result"
      uses: actions/cache@v4
      with:
        path: ./tmp
        key: "${{ runner.os }}-${{ matrix.php }}-phpstan-result-cache"

    - name: Validate composer.json
      run: composer validate

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run PHP Simple Lint
      uses: davidlienhard/php-simple-lint@v1
      with:
        folder: './'
        ignore: './vendor/\*'

    - name: Show changed files
      run: composer changed-files

    - name: Run phpcs
      run: composer phpcs-diff

    - name: Run phpunit
      run: composer phpunit

    - name: Run phpstan
      run: composer phpstan
